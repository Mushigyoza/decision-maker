<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>決策助手</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #E2DDD8;
    --text: #1A1814;
    --text2: #6B6560;
    --text3: #9E9890;
    --accent: #2D6A4F;
    --accent-light: #D8EDE4;
    --accent2: #E07A3A;
    --accent2-light: #FAEBD7;
    --danger: #C0392B;
    --danger-light: #FDECEA;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── AUTH ── */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .auth-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .auth-logo {
    width: 48px;
    height: 48px;
    background: var(--accent);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .auth-logo svg { width: 26px; height: 26px; fill: white; }

  .auth-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.3rem;
  }

  .auth-sub {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 2rem;
  }

  .auth-tabs {
    display: flex;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 3px;
    margin-bottom: 1.5rem;
  }

  .auth-tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.2s;
    border: none;
    background: none;
  }

  .auth-tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .form-group { margin-bottom: 1rem; }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 6px;
  }

  input[type="email"], input[type="password"], input[type="text"],
  input[type="number"], textarea, select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
  }

  textarea { resize: vertical; min-height: 80px; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 20px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    width: 100%;
  }

  .btn-primary:hover { background: #235c42; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: var(--border); }

  .btn-danger {
    background: var(--danger-light);
    color: var(--danger);
    border: 1px solid rgba(192,57,43,0.2);
  }

  .btn-ghost {
    background: none;
    color: var(--text2);
    padding: 8px 12px;
  }

  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  .btn-icon {
    width: 36px;
    height: 36px;
    padding: 0;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.2s;
  }

  .btn-icon:hover { background: var(--border); color: var(--text); }

  .error-msg {
    background: var(--danger-light);
    color: var(--danger);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    margin-top: 0.75rem;
    display: none;
  }

  /* ── APP LAYOUT ── */
  #app-screen { display: none; min-height: 100vh; }

  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 16px;
  }

  .header-logo-icon {
    width: 30px;
    height: 30px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .header-logo-icon svg { width: 16px; height: 16px; fill: white; }

  .header-user {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-email {
    font-size: 13px;
    color: var(--text2);
    display: none;
  }

  @media (min-width: 600px) { .user-email { display: block; } }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 0;
    cursor: pointer;
    color: var(--text3);
    font-size: 11px;
    font-weight: 500;
    transition: color 0.2s;
    border: none;
    background: none;
    font-family: inherit;
  }

  .nav-item svg { width: 22px; height: 22px; }
  .nav-item.active { color: var(--accent); }
  .nav-item.add-btn { color: white; }

  .nav-add {
    width: 48px;
    height: 48px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
    box-shadow: 0 4px 12px rgba(45,106,79,0.4);
  }

  .nav-add svg { width: 24px; height: 24px; fill: white; }

  /* ── PAGES ── */
  .page {
    display: none;
    padding: 1.25rem 1rem 120px;
    max-width: 600px;
    margin: 0 auto;
  }

  .page.active { display: block; }

  .page-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 1.25rem;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.25rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    flex: 1;
    padding-right: 8px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-purchase { background: #DBEAFE; color: #1D4ED8; }
  .badge-invest { background: #D1FAE5; color: #065F46; }
  .badge-life { background: #FEF3C7; color: #92400E; }

  .badge-high { background: var(--accent-light); color: var(--accent); }
  .badge-mid { background: var(--accent2-light); color: #B8621A; }
  .badge-low { background: #F3F4F6; color: #6B7280; }

  .card-meta {
    display: flex;
    gap: 12px;
    font-size: 13px;
    color: var(--text2);
    flex-wrap: wrap;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  /* ── STEP FORM ── */
  .step-indicator {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
  }

  .step-dot {
    height: 4px;
    flex: 1;
    border-radius: 99px;
    background: var(--border);
    transition: background 0.3s;
  }

  .step-dot.active { background: var(--accent); }
  .step-dot.done { background: var(--accent); opacity: 0.4; }

  .step-label {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 1.25rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .step-content { display: none; }
  .step-content.active { display: block; }

  /* ── OPTIONS ── */
  .option-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }

  .option-label {
    width: 32px;
    height: 32px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }

  /* ── TENDENCY SELECTOR ── */
  .tendency-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .tendency-chip {
    padding: 8px 16px;
    border-radius: 99px;
    border: 1px solid var(--border);
    font-size: 14px;
    cursor: pointer;
    background: var(--surface);
    color: var(--text);
    transition: all 0.2s;
    font-family: inherit;
  }

  .tendency-chip:hover { border-color: var(--accent); color: var(--accent); }
  .tendency-chip.selected { background: var(--accent); color: white; border-color: var(--accent); }

  /* ── AI ANALYSIS ── */
  .ai-section {
    background: var(--accent-light);
    border-radius: var(--radius);
    border: 1px solid rgba(45,106,79,0.2);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .ai-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  .ai-block {
    background: white;
    border-radius: var(--radius-sm);
    padding: 1rem;
    margin-bottom: 0.75rem;
    border: 1px solid rgba(45,106,79,0.12);
  }

  .ai-block:last-child { margin-bottom: 0; }

  .ai-block-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  .ai-block-content {
    font-size: 14px;
    color: var(--text);
    line-height: 1.65;
    white-space: pre-wrap;
  }

  .ai-verdict {
    background: var(--accent);
    color: white;
    border-radius: var(--radius-sm);
    padding: 1rem;
    text-align: center;
  }

  .ai-verdict-label { font-size: 12px; opacity: 0.8; margin-bottom: 4px; }
  .ai-verdict-choice { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .ai-verdict-conf { font-size: 13px; opacity: 0.85; }

  .loading-dots {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: var(--text2);
    font-size: 14px;
  }

  .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-chip {
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    background: var(--surface);
    color: var(--text2);
    transition: all 0.2s;
    font-family: inherit;
  }

  .filter-chip.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  /* ── STATS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1rem;
    box-shadow: var(--shadow);
  }

  .stat-label {
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    font-family: 'DM Mono', monospace;
  }

  .stat-sub {
    font-size: 12px;
    color: var(--text3);
    margin-top: 4px;
  }

  .chart-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.25rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
  }

  .chart-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 1rem;
  }

  .chart-wrap {
    position: relative;
    height: 200px;
  }

  /* ── DETAIL PAGE ── */
  .detail-section {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.25rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
  }

  .detail-section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 6px 0;
    font-size: 14px;
    gap: 12px;
  }

  .detail-key { color: var(--text2); flex-shrink: 0; }
  .detail-val { color: var(--text); font-weight: 500; text-align: right; }

  /* ── REVIEW ── */
  .stars {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }

  .star {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }

  .star.active { background: #FEF3C7; border-color: #F59E0B; }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text2);
  }

  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 1rem;
    opacity: 0.4;
  }

  .empty-state h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
  .empty-state p { font-size: 14px; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 1rem 0;
  }

  .nav-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 1.25rem;
  }

  .nav-row .btn { flex: 1; }

  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }

  .tag {
    padding: 4px 10px;
    background: var(--surface2);
    border-radius: 99px;
    font-size: 13px;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .tag.selected {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  select option { font-family: 'Noto Sans TC', sans-serif; }

  .inline-error {
    font-size: 13px;
    color: var(--danger);
    margin-top: 6px;
  }

  .success-banner {
    background: var(--accent-light);
    color: var(--accent);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 1rem;
    display: none;
  }

  .pending-review-banner {
    background: var(--accent2-light);
    border: 1px solid rgba(224,122,58,0.25);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    color: #8B4513;
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
</style>
</head>
<body>

<!-- ════════════════════════════
     AUTH SCREEN
════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <div class="auth-title">決策助手</div>
    <div class="auth-sub">記錄每個選擇，找到你的決策模式</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">登入</button>
      <button class="auth-tab" onclick="switchTab('register')">註冊</button>
    </div>

    <div id="login-form">
      <div class="form-group">
        <label class="form-label">電子郵件</label>
        <input type="email" id="login-email" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">密碼</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" onclick="doLogin()" id="login-btn">登入</button>
      <div class="error-msg" id="login-error"></div>
    </div>

    <div id="register-form" style="display:none;">
      <div class="form-group">
        <label class="form-label">電子郵件</label>
        <input type="email" id="reg-email" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">密碼（至少6碼）</label>
        <input type="password" id="reg-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" onclick="doRegister()" id="reg-btn">建立帳號</button>
      <div class="error-msg" id="reg-error"></div>
    </div>
  </div>
</div>

<!-- ════════════════════════════
     APP SCREEN
════════════════════════════ -->
<div id="app-screen">

  <!-- Header -->
  <div class="app-header">
    <div class="header-logo">
      <div class="header-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      </div>
      決策助手
    </div>
    <div class="header-user">
      <span class="user-email" id="header-email"></span>
      <button class="btn-icon" onclick="doLogout()" title="登出">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </div>

  <!-- Pages -->
  <!-- LIST PAGE -->
  <div class="page active" id="page-list">
    <div class="page-title">我的決策</div>
    <div class="filter-bar">
      <button class="filter-chip active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-chip" onclick="setFilter('購物',this)">購物</button>
      <button class="filter-chip" onclick="setFilter('投資',this)">投資</button>

<script>
// ════════════════════════════
//  CONFIG — 請填入你的金鑰
// ════════════════════════════
const SUPABASE_URL = 'https://fbsjolrnhschtcqycuru.supabase.co';
const SUPABASE_KEY = 'sb_publishable_CCnHGr4TekmOYzq_eAZWkw_bSd1C7JM';
const GEMINI_KEY   = 'AIzaSyBaDXtBHyR-N5iZCjZz5R5iDLbr1--FEDY';

// ════════════════════════════
//  INIT
// ════════════════════════════
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let allDecisions = [];
let currentFilter = 'all';
let currentDecisionId = null;
let aiAnalysisResult = null;
let selectedTendency = '';
let selectedAdopt = '';
let selectedFinalChoice = '';

// Auth state
db.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('header-email').textContent = currentUser.email;
    await loadDecisions();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});

// ════════════════════════════
//  AUTH
// ════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register'));
  });
  document.getElementById('login-form').style.display = tab==='login'?'block':'none';
  document.getElementById('register-form').style.display = tab==='register'?'block':'none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = '登入中…';
  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) { err.textContent = '登入失敗：' + error.message; err.style.display='block'; }
  btn.disabled = false; btn.textContent = '登入';
}

async function doRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const btn = document.getElementById('reg-btn');
  const err = document.getElementById('reg-error');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = '建立中…';
  const { error } = await db.auth.signUp({ email, password });
  if (error) { err.textContent = '註冊失敗：' + error.message; err.style.display='block'; }
  else { err.style.background='#D1FAE5'; err.style.color='#065F46'; err.textContent='帳號已建立！請直接登入。'; err.style.display='block'; switchTab('login'); }
  btn.disabled = false; btn.textContent = '建立帳號';
}

async function doLogout() {
  await db.auth.signOut();
}

// ════════════════════════════
//  NAVIGATION
// ════════════════════════════
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (page === 'list') { document.getElementById('nav-list').classList.add('active'); loadDecisions(); }
  if (page === 'add') { resetForm(); }
  if (page === 'stats') { document.getElementById('nav-stats').classList.add('active'); loadStats(); }
}

// ════════════════════════════
//  LOAD DECISIONS
// ════════════════════════════
async function loadDecisions() {
  const { data, error } = await db.from('decisions').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
  if (error) { console.error(error); return; }
  allDecisions = data || [];
  renderList();
}

function renderList() {
  const container = document.getElementById('decisions-list');
  let items = allDecisions;
  const today = new Date();

  if (currentFilter !== 'all') {
    if (currentFilter === 'pending_review') {
      items = items.filter(d => d.review_due && !d.satisfaction && new Date(d.review_due) <= today);
    } else {
      items = items.filter(d => d.type === currentFilter);
    }
  }

  if (items.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><h3>還沒有決策紀錄</h3><p>點下方 ＋ 開始記錄你的第一個決策</p></div>`;
    return;
  }

  container.innerHTML = items.map(d => {
    const opts = Array.isArray(d.options) ? d.options : [];
    const typeBadge = d.type === '購物' ? 'badge-purchase' : d.type === '投資' ? 'badge-invest' : 'badge-life';
    const confBadge = d.ai_confidence === '高' ? 'badge-high' : d.ai_confidence === '中' ? 'badge-mid' : 'badge-low';
    const date = new Date(d.created_at).toLocaleDateString('zh-TW', { month:'short', day:'numeric' });
    const isPendingReview = d.review_due && !d.satisfaction && new Date(d.review_due) <= today;

    return `<div class="card">
      <div class="card-header">
        <div class="card-title">${escHtml(d.title)}</div>
        <span class="badge ${typeBadge}">${d.type}</span>
      </div>
      <div class="card-meta">
        <span>${date}</span>
        ${d.amount ? `<span>NT$ ${Number(d.amount).toLocaleString()}</span>` : ''}
        ${d.ai_suggest ? `<span>AI建議：${d.ai_suggest}</span>` : ''}
        ${d.final_choice ? `<span>最終：${d.final_choice}</span>` : '<span style="color:var(--text3)">未定</span>'}
        ${d.satisfaction ? `<span>${'★'.repeat(d.satisfaction)}${'☆'.repeat(5-d.satisfaction)}</span>` : ''}
      </div>
      ${isPendingReview ? `<div class="pending-review-banner">⏰ 後驗回顧時間到了！</div>` : ''}
      <div class="card-actions">
        <button class="btn btn-secondary" style="flex:1;font-size:13px;" onclick="openDetail('${d.id}')">查看詳情</button>
        ${!d.final_choice ? `<button class="btn btn-ghost" style="font-size:13px;" onclick="openDetail('${d.id}')">填寫結果</button>` : ''}
        ${isPendingReview ? `<button class="btn btn-primary" style="flex:1;font-size:13px;" onclick="openDetail('${d.id}')">填寫回顧</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

// ════════════════════════════
//  DETAIL PAGE
// ════════════════════════════
function openDetail(id) {
  currentDecisionId = id;
  const d = allDecisions.find(x => x.id === id);
  if (!d) return;
  showPage('detail');
  renderDetail(d);
}

function renderDetail(d) {
  const opts = Array.isArray(d.options) ? d.options : [];
  const ai = d.ai_analysis || {};
  const date = new Date(d.created_at).toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric' });
  const today = new Date();
  const isPendingReview = d.review_due && !d.satisfaction && new Date(d.review_due) <= today;

  let html = `
    <div class="detail-section">
      <div class="detail-section-title">基本資訊</div>
      <div style="font-size:17px;font-weight:700;margin-bottom:.75rem;">${escHtml(d.title)}</div>
      <div class="detail-row"><span class="detail-key">類型</span><span class="detail-val">${d.type}</span></div>
      <div class="detail-row"><span class="detail-key">建立日期</span><span class="detail-val">${date}</span></div>
      ${d.amount ? `<div class="detail-row"><span class="detail-key">金額</span><span class="detail-val">NT$ ${Number(d.amount).toLocaleString()}</span></div>` : ''}
      ${d.context ? `<div class="detail-row"><span class="detail-key">情境</span><span class="detail-val" style="text-align:right;">${escHtml(d.context)}</span></div>` : ''}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">選項</div>
      ${opts.map((o,i) => `<div class="detail-row"><span class="detail-key">${String.fromCharCode(65+i)}</span><span class="detail-val">${escHtml(o)}</span></div>`).join('')}
      <div class="detail-row"><span class="detail-key">當下傾向</span><span class="detail-val">${d.tendency||'未定'}</span></div>
    </div>`;

  if (ai.motivations) {
    html += `<div class="detail-section">
      <div class="detail-section-title">AI 分析</div>
      ${ai.motivations ? `<div style="margin-bottom:.75rem;"><div style="font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500;">動機拆解</div><div style="font-size:14px;line-height:1.65;white-space:pre-wrap;">${escHtml(ai.motivations)}</div></div>` : ''}
      ${ai.regret_risk ? `<div style="margin-bottom:.75rem;"><div style="font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500;">後悔風險</div><div style="font-size:14px;line-height:1.65;white-space:pre-wrap;">${escHtml(ai.regret_risk)}</div></div>` : ''}
      ${d.ai_suggest ? `<div style="background:var(--accent-light);border-radius:8px;padding:12px;text-align:center;">
        <div style="font-size:12px;color:var(--accent);margin-bottom:4px;font-weight:500;">AI 建議</div>
        <div style="font-size:20px;font-weight:700;color:var(--accent);">選 ${d.ai_suggest}</div>
        ${d.ai_confidence ? `<div style="font-size:13px;color:var(--accent);margin-top:2px;">信心程度：${d.ai_confidence}</div>` : ''}
        ${ai.reason ? `<div style="font-size:13px;color:var(--text2);margin-top:8px;">${escHtml(ai.reason)}</div>` : ''}
      </div>` : ''}
    </div>`;
  }

  html += `<div class="detail-section">
    <div class="detail-section-title">決策結果</div>
    <div class="detail-row"><span class="detail-key">採用 AI</span><span class="detail-val">${d.adopted||'—'}</span></div>
    ${d.reject_reason ? `<div class="detail-row"><span class="detail-key">原因</span><span class="detail-val">${d.reject_reason}</span></div>` : ''}
    <div class="detail-row"><span class="detail-key">最終選擇</span><span class="detail-val">${d.final_choice||'—'}</span></div>
    ${d.decision_delay ? `<div class="detail-row"><span class="detail-key">延遲天數</span><span class="detail-val">${d.decision_delay} 天</span></div>` : ''}
  </div>`;

  // Review section
  if (d.satisfaction) {
    html += `<div class="detail-section">
      <div class="detail-section-title">後驗回顧</div>
      <div class="detail-row"><span class="detail-key">滿意度</span><span class="detail-val">${'★'.repeat(d.satisfaction)}${'☆'.repeat(5-d.satisfaction)}</span></div>
      <div class="detail-row"><span class="detail-key">有後悔嗎</span><span class="detail-val">${d.regret===true?'是':d.regret===false?'否':'—'}</span></div>
      ${d.revisit ? `<div class="detail-row"><span class="detail-key">重來會選</span><span class="detail-val">${escHtml(d.revisit)}</span></div>` : ''}
      ${d.regret_reason ? `<div class="detail-row"><span class="detail-key">後悔原因</span><span class="detail-val">${escHtml(d.regret_reason)}</span></div>` : ''}
    </div>`;
  } else if (isPendingReview || !d.satisfaction) {
    html += renderReviewForm(d, opts);
  }

  html += `<div style="margin-top:1rem;">
    <button class="btn btn-danger" style="width:100%;font-size:14px;" onclick="deleteDecision('${d.id}')">刪除這筆決策</button>
  </div>`;

  document.getElementById('detail-content').innerHTML = html;

  // Init star buttons
  document.querySelectorAll('.star').forEach(s => {
    s.addEventListener('click', () => {
      const val = parseInt(s.dataset.val);
      document.querySelectorAll('.star').forEach((st,i) => st.classList.toggle('active', i < val));
      document.getElementById('review-satisfaction').value = val;
    });
  });
}

function renderReviewForm(d, opts) {
  const isPending = d.review_due && new Date(d.review_due) <= new Date();
  const optChoices = opts.map((o,i) => `<option value="${escHtml(o)}">${String.fromCharCode(65+i)}: ${escHtml(o)}</option>`).join('');

  return `<div class="detail-section" style="border-color:var(--accent);border-width:1.5px;">
    <div class="detail-section-title" style="color:var(--accent);">後驗回顧 ${isPending?'⏰':'（可提前填）'}</div>

    <div class="form-group">
      <label class="form-label">滿意度</label>
      <input type="hidden" id="review-satisfaction" value="" />
      <div class="stars">
        ${[1,2,3,4,5].map(i => `<button class="star" data-val="${i}" type="button">★</button>`).join('')}

    </div>

    <div class="form-group">
      <label class="form-label">有後悔嗎？</label>
      <div class="tag-list">
        <button class="tag" onclick="selectTag(this,'regret-group','是')">是</button>
        <button class="tag" onclick="selectTag(this,'regret-group','否')">否</button>
      </div>
      <input type="hidden" id="review-regret" value="" />
    </div>

    <div class="form-group">
      <label class="form-label">重來會選？</label>
      <select id="review-revisit">
        <option value="">選擇</option>
        ${optChoices}
        <option value="一樣">一樣的選擇</option>
      </select>
    </div>

    <div class="form-group" id="regret-reason-group" style="display:none;">
      <label class="form-label">後悔原因</label>
      <select id="review-regret-reason">
        <option value="">選擇原因</option>
        <option value="品質不如預期">品質不如預期</option>
        <option value="價格不值得">價格不值得</option>
        <option value="其實不需要">其實不需要</option>
        <option value="有更好的選擇">有更好的選擇</option>
        <option value="情緒決策">當時是情緒決策</option>
        <option value="資訊不足">當時資訊不足</option>
        <option value="其他">其他</option>
      </select>
    </div>

    <button class="btn btn-primary" style="width:100%;margin-top:8px;" onclick="saveReview('${d.id}')">儲存回顧</button>
  </div>`;
}

function selectTag(el, groupId, val) {
  const group = el.closest('.form-group');
  group.querySelectorAll('.tag').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  if (groupId === 'regret-group') {
    document.getElementById('review-regret').value = val;
    document.getElementById('regret-reason-group').style.display = val === '是' ? 'block' : 'none';
  }
}

async function saveReview(id) {
  const satisfaction = parseInt(document.getElementById('review-satisfaction').value);
  const regretVal = document.getElementById('review-regret').value;
  const revisit = document.getElementById('review-revisit').value;
  const regretReason = document.getElementById('review-regret-reason')?.value || '';

  if (!satisfaction) { alert('請填寫滿意度'); return; }
  if (!regretVal) { alert('請選擇是否後悔'); return; }

  const { error } = await db.from('decisions').update({
    satisfaction,
    regret: regretVal === '是',
    revisit,
    regret_reason: regretReason
  }).eq('id', id);

  if (error) { alert('儲存失敗：' + error.message); return; }

  await loadDecisions();
  const updated = allDecisions.find(x => x.id === id);
  if (updated) renderDetail(updated);
}

async function deleteDecision(id) {
  if (!confirm('確定要刪除這筆決策嗎？')) return;
  const { error } = await db.from('decisions').delete().eq('id', id);
  if (error) { alert('刪除失敗'); return; }
  await loadDecisions();
  showPage('list');
}

// ════════════════════════════
//  ADD FORM
// ════════════════════════════
const OPTION_LETTERS = 'ABCDEFGHIJ';

function resetForm() {
  document.getElementById('f-title').value = '';
  document.getElementById('f-type').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-context').value = '';
  document.getElementById('f-delay').value = '0';
  document.getElementById('options-container').innerHTML = `
    <div class="option-row"><div class="option-label">A</div><input type="text" placeholder="選項 A 是什麼" oninput="updateTendencyChips()" /></div>
    <div class="option-row"><div class="option-label">B</div><input type="text" placeholder="選項 B 是什麼" oninput="updateTendencyChips()" /></div>`;
  document.getElementById('tendency-grid').innerHTML = `<button class="tendency-chip" onclick="setTendency('未定')">未定</button>`;
  document.getElementById('final-choice-grid').innerHTML = '';
  document.getElementById('ai-result').innerHTML = '';
  document.getElementById('ai-result').style.display = 'none';
  document.getElementById('ai-loading').style.display = 'none';
  document.getElementById('ai-adopt').style.display = 'none';
  document.getElementById('step3-nav').style.display = 'none';
  document.getElementById('step3-analyze-btn').style.display = 'block';
  document.getElementById('reject-reason-group').style.display = 'none';
  selectedTendency = '';
  selectedAdopt = '';
  selectedFinalChoice = '';
  aiAnalysisResult = null;
  goStep(1, true);
}

function addOption() {
  const container = document.getElementById('options-container');
  const count = container.querySelectorAll('.option-row').length;
  if (count >= 6) { alert('最多6個選項'); return; }
  const row = document.createElement('div');
  row.className = 'option-row';
  row.innerHTML = `<div class="option-label">${OPTION_LETTERS[count]}</div><input type="text" placeholder="選項 ${OPTION_LETTERS[count]} 是什麼" oninput="updateTendencyChips()" /><button class="btn-icon" onclick="this.parentElement.remove();updateOptionLabels();updateTendencyChips();" style="flex-shrink:0;">✕</button>`;
  container.appendChild(row);
  updateTendencyChips();
}

function updateOptionLabels() {
  document.querySelectorAll('#options-container .option-label').forEach((el,i) => el.textContent = OPTION_LETTERS[i]);
}

function getOptions() {
  return Array.from(document.querySelectorAll('#options-container input')).map(i => i.value.trim()).filter(Boolean);
}

function updateTendencyChips() {
  const opts = getOptions();
  const grid = document.getElementById('tendency-grid');
  const currentSel = selectedTendency;
  grid.innerHTML = opts.map((o,i) => {
    const letter = OPTION_LETTERS[i];
    const label = o ? `${letter}: ${o.length > 10 ? o.slice(0,10)+'…' : o}` : letter;
    return `<button class="tendency-chip${currentSel===letter?' selected':''}" onclick="setTendency('${letter}')">${label}</button>`;
  }).join('') + `<button class="tendency-chip${currentSel==='未定'?' selected':''}" onclick="setTendency('未定')">未定</button>`;

  // Final choice grid
  const fcg = document.getElementById('final-choice-grid');
  fcg.innerHTML = opts.map((o,i) => {
    const letter = OPTION_LETTERS[i];
    const label = o ? `${letter}: ${o.length > 10 ? o.slice(0,10)+'…' : o}` : letter;
    return `<button class="tendency-chip${selectedFinalChoice===letter?' selected':''}" onclick="setFinalChoice('${letter}')">${label}</button>`;
  }).join('') + `<button class="tendency-chip${selectedFinalChoice==='沒做'?' selected':''}" onclick="setFinalChoice('沒做')">沒做</button>`;
}

function setTendency(val) {
  selectedTendency = val;
  document.querySelectorAll('#tendency-grid .tendency-chip').forEach(c => {
    c.classList.toggle('selected', c.textContent.startsWith(val) || c.textContent === val);
  });
}

function setFinalChoice(val) {
  selectedFinalChoice = val;
  document.querySelectorAll('#final-choice-grid .tendency-chip').forEach(c => {
    c.classList.toggle('selected', c.textContent.startsWith(val) || c.textContent === val);
  });
}

function setAdopt(val, el) {
  selectedAdopt = val;
  document.querySelectorAll('#ai-adopt .tag').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('reject-reason-group').style.display = (val==='否'||val==='部分') ? 'block' : 'none';
}

function goStep(n, silent) {
  document.querySelectorAll('.step-content').forEach((s,i) => s.classList.toggle('active', i===n-1));
  ['sd1','sd2','sd3','sd4'].forEach((id,i) => {
    const el = document.getElementById(id);
    el.classList.toggle('active', i===n-1);
    el.classList.toggle('done', i<n-1);
  });
  if (!silent) window.scrollTo({top:0, behavior:'smooth'});
}

// ════════════════════════════
//  AI ANALYSIS
// ════════════════════════════
async function runAnalysis() {
  const title = document.getElementById('f-title').value.trim();
  const type = document.getElementById('f-type').value;
  const context = document.getElementById('f-context').value.trim();
  const amount = document.getElementById('f-amount').value;
  const opts = getOptions();

  if (!title) { alert('請先填寫猶豫內容'); goStep(1); return; }
  if (opts.length < 2) { alert('請先填寫至少2個選項'); goStep(2); return; }

  document.getElementById('step3-analyze-btn').style.display = 'none';
  document.getElementById('ai-loading').style.display = 'flex';
  document.getElementById('ai-result').style.display = 'none';
  document.getElementById('ai-adopt').style.display = 'none';
  document.getElementById('step3-nav').style.display = 'none';

  const optText = opts.map((o,i) => `${OPTION_LETTERS[i]}: ${o}`).join('\n');
  const prompt = `你是一個決策分析顧問。請針對以下決策進行分析，並一定要給出明確立場和建議。

決策標題：${title}
類型：${type||'未知'}
${amount ? `金額：NT$ ${amount}` : ''}
${context ? `情境：${context}` : ''}
選項：
${optText}
當下傾向：${selectedTendency||'未定'}

請以下面的 JSON 格式回覆（只輸出 JSON，不要其他文字）：
{
  "motivations": "【理性因素】xxx\\n【情緒因素】xxx",
  "regret_risk": "${opts.map((o,i)=>`【選${OPTION_LETTERS[i]}後悔風險】xxx`).join('\\n')}\\n【最可能後悔的是】xxx",
  "suggest": "A或B或C（只填字母）",
  "confidence": "高或中或低",
  "reason": "建議理由（2-3句話）"
}`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    text = text.replace(/```json|```/g, '').trim();
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('找不到 JSON 格式回應');
    const parsed = JSON.parse(jsonMatch[0]);
    aiAnalysisResult = parsed;

    const suggestOpt = opts[OPTION_LETTERS.indexOf(parsed.suggest)] || parsed.suggest;
    const confBadge = parsed.confidence==='高'?'badge-high':parsed.confidence==='中'?'badge-mid':'badge-low';

    document.getElementById('ai-result').innerHTML = `
      <div class="ai-section">
        <div class="ai-header">✦ AI 分析結果</div>
        <div class="ai-block">
          <div class="ai-block-title">動機拆解</div>
          <div class="ai-block-content">${escHtml(parsed.motivations)}</div>
        </div>
        <div class="ai-block">
          <div class="ai-block-title">後悔風險</div>
          <div class="ai-block-content">${escHtml(parsed.regret_risk)}</div>
        </div>
        <div class="ai-verdict">
          <div class="ai-verdict-label">AI 建議選擇</div>
          <div class="ai-verdict-choice">選 ${parsed.suggest}：${escHtml(suggestOpt)}</div>
          <div class="ai-verdict-conf">信心程度：${parsed.confidence}</div>
          ${parsed.reason ? `<div style="font-size:13px;opacity:0.85;margin-top:8px;">${escHtml(parsed.reason)}</div>` : ''}
        </div>
      </div>`;

    document.getElementById('ai-loading').style.display = 'none';
    document.getElementById('ai-result').style.display = 'block';
    document.getElementById('ai-adopt').style.display = 'block';
    document.getElementById('step3-nav').style.display = 'flex';

  } catch(e) {
    document.getElementById('ai-loading').style.display = 'none';
    document.getElementById('ai-result').innerHTML = `<div style="background:var(--danger-light);color:var(--danger);border-radius:8px;padding:12px;font-size:14px;">AI 分析失敗：${e.message}<br>請檢查 Gemini API Key 是否正確</div>`;
    document.getElementById('ai-result').style.display = 'block';
    document.getElementById('step3-nav').style.display = 'flex';
    document.getElementById('step3-analyze-btn').style.display = 'block';
  }
}

function skipAnalysis() {
  aiAnalysisResult = null;
  goStep(4);
  updateTendencyChips();
}

// ════════════════════════════
//  SAVE DECISION
// ════════════════════════════
async function saveDecision() {
  const title = document.getElementById('f-title').value.trim();
  const type = document.getElementById('f-type').value;
  const opts = getOptions();

  if (!title) { alert('請填寫猶豫內容'); goStep(1); return; }
  if (!type) { alert('請選擇類型'); goStep(1); return; }
  if (opts.length < 2) { alert('請填寫至少2個選項'); goStep(2); return; }

  const reviewDue = new Date();
  reviewDue.setDate(reviewDue.getDate() + 7);

  const payload = {
    user_id: currentUser.id,
    title,
    type,
    options: opts,
    tendency: selectedTendency || null,
    amount: document.getElementById('f-amount').value ? parseFloat(document.getElementById('f-amount').value) : null,
    context: document.getElementById('f-context').value.trim() || null,
    ai_analysis: aiAnalysisResult || null,
    ai_suggest: aiAnalysisResult?.suggest || null,
    ai_confidence: aiAnalysisResult?.confidence || null,
    adopted: selectedAdopt || null,
    reject_reason: document.getElementById('f-reject-reason')?.value || null,
    final_choice: selectedFinalChoice || null,
    decision_delay: parseInt(document.getElementById('f-delay').value) || 0,
    review_due: reviewDue.toISOString().split('T')[0]
  };

  const { error } = await db.from('decisions').insert([payload]);
  if (error) { alert('儲存失敗：' + error.message); return; }

  await loadDecisions();
  showPage('list');
}

// ════════════════════════════
//  STATS
// ════════════════════════════
let chartInstances = {};

async function loadStats() {
  await loadDecisions();
  const d = allDecisions;
  const container = document.getElementById('stats-content');

  if (d.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📊</div><h3>還沒有足夠資料</h3><p>多記錄幾筆決策後，這裡會顯示你的決策模式</p></div>`;
    return;
  }

  const total = d.length;
  const withReview = d.filter(x => x.satisfaction);
  const withFinal = d.filter(x => x.final_choice);
  const regretCount = withReview.filter(x => x.regret).length;
  const regretRate = withReview.length ? Math.round(regretCount / withReview.length * 100) : 0;
  const aiAdopted = d.filter(x => x.adopted === '是').length;
  const aiTotal = d.filter(x => x.adopted).length;
  const aiAdoptRate = aiTotal ? Math.round(aiAdopted / aiTotal * 100) : 0;
  const avgSat = withReview.length ? (withReview.reduce((a,b) => a + (b.satisfaction||0), 0) / withReview.length).toFixed(1) : '—';

  // Regret when not following AI
  const notAdopted = d.filter(x => x.adopted === '否' && x.regret !== null);
  const notAdoptedRegret = notAdopted.filter(x => x.regret).length;
  const notAdoptedRegretRate = notAdopted.length ? Math.round(notAdoptedRegret / notAdopted.length * 100) : null;

  container.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">總決策數</div><div class="stat-value">${total}</div><div class="stat-sub">筆紀錄</div></div>
      <div class="stat-card"><div class="stat-label">後悔率</div><div class="stat-value">${withReview.length ? regretRate+'%' : '—'}</div><div class="stat-sub">${withReview.length} 筆有回顧</div></div>
      <div class="stat-card"><div class="stat-label">AI 採用率</div><div class="stat-value">${aiTotal ? aiAdoptRate+'%' : '—'}</div><div class="stat-sub">${aiTotal} 筆有 AI 分析</div></div>
      <div class="stat-card"><div class="stat-label">平均滿意度</div><div class="stat-value">${avgSat}</div><div class="stat-sub">滿分 5 分</div></div>
    </div>

    ${notAdoptedRegretRate !== null ? `<div class="card" style="background:var(--accent2-light);border-color:rgba(224,122,58,0.25);">
      <div style="font-size:13px;font-weight:600;color:#8B4513;margin-bottom:4px;">不聽 AI → 後悔率</div>
      <div style="font-size:32px;font-weight:700;color:#B8621A;font-family:'DM Mono',monospace;">${notAdoptedRegretRate}%</div>
      <div style="font-size:13px;color:#8B4513;margin-top:2px;">（${notAdopted.length} 筆未採用 AI 的決策）</div>
    </div>` : ''}

    <div class="chart-card">
      <div class="chart-title">決策類型分佈</div>
      <div class="chart-wrap"><canvas id="chart-type"></canvas></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">各類型後悔率</div>
      <div class="chart-wrap"><canvas id="chart-regret"></canvas></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">未採用 AI 的原因</div>
      <div class="chart-wrap"><canvas id="chart-reject"></canvas></div>
    </div>`;

  // Destroy old charts
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};

  // Type distribution
  const types = ['購物','投資','生活'];
  const typeCounts = types.map(t => d.filter(x => x.type===t).length);
  chartInstances.type = new Chart(document.getElementById('chart-type'), {
    type: 'doughnut',
    data: {
      labels: types,
      datasets: [{ data: typeCounts, backgroundColor: ['#BFDBFE','#BBF7D0','#FEF08A'], borderWidth: 1 }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
  });

  // Regret by type
  const regretByType = types.map(t => {
    const rev = d.filter(x => x.type===t && x.satisfaction);
    return rev.length ? Math.round(rev.filter(x=>x.regret).length/rev.length*100) : 0;
  });
  chartInstances.regret = new Chart(document.getElementById('chart-regret'), {
    type: 'bar',
    data: {
      labels: types,
      datasets: [{ label: '後悔率 %', data: regretByType, backgroundColor: ['#93C5FD','#6EE7B7','#FCD34D'], borderRadius: 6 }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { max: 100, ticks: { callback: v => v+'%' } } } }
  });

  // Reject reasons
  const rejectReasons = d.filter(x => x.reject_reason).reduce((acc,x) => { acc[x.reject_reason]=(acc[x.reject_reason]||0)+1; return acc; }, {});
  const rrKeys = Object.keys(rejectReasons);
  chartInstances.reject = new Chart(document.getElementById('chart-reject'), {
    type: 'bar',
    data: {
      labels: rrKeys.length ? rrKeys : ['尚無資料'],
      datasets: [{ label: '次數', data: rrKeys.length ? rrKeys.map(k=>rejectReasons[k]) : [0], backgroundColor: '#C4B5FD', borderRadius: 6 }]
    },
    options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } } }
  });
}

// ════════════════════════════
//  UTILS
// ════════════════════════════
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
